<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ Quán ăn Hải Phòng</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" crossorigin=""/>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">

                <h1></i> FoodMap Hải Phòng</h1>
                <p>Khám phá ẩm thực đất Cảng</p>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Tìm quán ăn, địa chỉ, loại bữa...">
                </div>
                
                <div class="filter-chips">
                    <button class="chip active" data-filter="all">Tất cả</button>
                    <button class="chip" data-filter="Ăn sáng">Ăn sáng</button>
                    <button class="chip" data-filter="Ăn trưa">Ăn trưa</button>
                    <button class="chip" data-filter="Ăn tối">Ăn tối</button>
                    <button class="chip" data-filter="Ăn vặt">Ăn vặt</button>
                </div>
            </div>

            <div class="radius-control" style="padding: 15px 20px; border-bottom: 1px solid var(--border-color);">
                <label for="radiusSlider" style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; color: var(--text-main); font-weight: 500;">
                    <span>Bán kính Ga Hải Phòng:</span>
                    <span id="radiusValue" style="color: var(--primary-color); font-weight: 700;">4 km</span>
                </label>
                <input type="range" id="radiusSlider" min="1" max="12" value="4" step="1" style="width: 100%; accent-color: var(--primary-color); cursor: pointer;">
            </div>

            <div class="restaurant-list" id="restaurantList">
                <!-- Items will be generated by JS -->
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
